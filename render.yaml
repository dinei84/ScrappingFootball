services:
  - type: web
    name: scrappingfootball
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn scrappingfootbla:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
