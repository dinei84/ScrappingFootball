<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scraping Futebol</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Onde assistir</h1>

    <nav class="tabs">
      <a href="/?aba=times" class="tab {% if aba == 'times' %}active{% endif %}">Times</a>
      <a href="/?aba=selecoes" class="tab {% if aba == 'selecoes' %}active{% endif %}">Seleções</a>
    </nav>

    <form method="post" action="/buscar" id="form-buscar">
      <input type="hidden" name="categoria" value="{{ aba }}">
      <label for="time">{{ rotulo }}</label>
      <select id="time" name="time" required>
        <option value="" disabled {% if not selecionado %}selected{% endif %}>Selecione uma opção</option>
        {% for item in itens %}
          <option value="{{ item.nome }}" {% if selecionado == item.nome %}selected{% endif %}>{{ item.nome }}</option>
        {% endfor %}
      </select>
      <button type="submit" id="btn-buscar">Buscar informação</button>
    </form>

    {% if resultado %}
      <div class="card">
        <h2>{{ selecionado }}</h2>
        {% if resultado.sucesso %}
          <p><strong>Horário:</strong> {{ resultado.horario }}</p>
          <p><strong>Transmissão:</strong> {{ resultado.transmissao }}</p>
        {% else %}
          <p class="error">{{ resultado.mensagem }}</p>
        {% endif %}
      </div>
    {% endif %}
  </div>

  <script>
    document.getElementById('form-buscar').addEventListener('submit', function () {
      var btn = document.getElementById('btn-buscar');
      btn.disabled = true;
      btn.textContent = 'Buscando...';
    });
  </script>
</body>
</html>
